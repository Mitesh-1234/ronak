<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find My Booking - Ronak & Natasha</title>
    <link rel="icon" type="image/jpeg" href="images/welcome.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/my-booking.css">
</head>

<body>

    <div class="lookup-container">
        <a href="travel.html" class="logo">Ronak & Natasha</a>
        <h2 style="margin-bottom: 10px;">Find My Booking</h2>
        <p style="color: var(--text-light); margin-bottom: 30px; font-size: 0.9rem;">Enter the email used for booking
            and your unique reference number to locate your digital itinerary.</p>

        <form id="lookupForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="mitesh@example.com">
            </div>
            <div class="form-group">
                <label>Booking Reference</label>
                <input type="text" id="refId" required placeholder="RNXXXXXX">
            </div>
            <p id="errorMsg" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 15px; display: none;">
                Booking not found. Please check your details.</p>
            <button type="submit" class="btn-primary" id="searchBtn">Find Reservation</button>
            <button type="button" class="btn-back" onclick="window.location.href='travel.html'">Return to Travel
                Guide</button>
        </form>

        <div id="itinerary">
            <h3 style="color: var(--primary); margin-bottom: 15px; text-align: center;"><i
                    class="fas fa-ticket-alt"></i> Guest Itinerary</h3>
            <div class="itinerary-row"><span class="i-label">Guest Name</span><span class="i-val" id="iName"></span>
            </div>
            <div class="itinerary-row"><span class="i-label">Hotel</span><span class="i-val" id="iHotel"></span></div>
            <div class="itinerary-row"><span class="i-label">Room Type</span><span class="i-val" id="iRoom"></span>
            </div>
            <div class="itinerary-row"><span class="i-label">Check In</span><span class="i-val" id="iIn"></span></div>
            <div class="itinerary-row"><span class="i-label">Check Out</span><span class="i-val" id="iOut"></span></div>
            <div class="itinerary-row"><span class="i-label">Amount Paid</span><span class="i-val" id="iPaid"></span>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button type="button" class="btn-primary" onclick="setTimeout(() => window.print(), 300)"
                    style="padding: 10px; font-size: 1rem;"><i class="fas fa-print"></i> Print Receipt</button>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module" src="js/my-booking.js"></script>
</body>

</html>
